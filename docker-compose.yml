version: '3.8'

services:
  backend:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env

  frontend:
    build: .
    command: python app/frontend/ui.py
    ports:
      - "7860:7860"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - backend